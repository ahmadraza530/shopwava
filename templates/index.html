<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shopwave</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <nav class="navbar">
    <div class="logo">Shopwave</div>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/">Products</a>
      <a href="/orders">Orders</a>
    </div>
    <div class="nav-icons">
      <button onclick="toggleTheme()" class="theme-toggle-btn">
        <span id="theme-label">Light</span>
      </button>
      {% if current_user.is_authenticated %}
        <span class="nav-username">{{ current_user.username }}</span>
        <a href="/logout" style="text-decoration:none; color:inherit;">Logout</a>
      {% else %}
        <a href="/login" style="text-decoration:none; color:inherit;">Login</a>
      {% endif %}
      <a href="/cart" style="text-decoration:none; color:inherit;">🛒</a>
    </div>
  </nav>

  <div class="product-grid">
    {% for product in products %}
    <div class="product-card">
      <a href="/product/{{ product.id }}" class="product-card-link">
        <div class="product-image">{{ product.emoji }}</div>
        <p class="product-name">{{ product.name }}</p>
        <p class="product-price">${{ "%.2f"|format(product.price) }}</p>
      </a>
      <form action="/add-to-cart/{{ product.id }}" method="POST">
        <button type="submit" class="add-to-cart">Add to cart</button>
      </form>
    </div>
    {% endfor %}
  </div>

  <div class="cart-summary">
    <span class="cart-text">Cart total (2 items)</span>
    <div class="cart-right">
      <span class="cart-amount">$79.98</span>
      <button class="checkout-btn">Checkout</button>
    </div>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
